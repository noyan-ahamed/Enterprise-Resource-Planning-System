<div class="container-fluid">

  <!-- Page Title -->
  <div class="row mb-3">
    <div class="col-12">
      <h5 class="fw-bold">Product Category</h5>
      <small class="text-muted">Create and manage product categories</small>
    </div>
  </div>

  <!-- Add Product Category -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white fw-semibold">
          Add Product Category
        </div>

        <div class="card-body">
          <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">

            <!-- 🔴 MUST: row না থাকলে col কাজ করবে না -->
            <div class="row g-3">

              <!-- Name -->
              <div class="col-md-4">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Category Name</mat-label>
                  <input matInput formControlName="name">
                </mat-form-field>
              </div>

              <!-- Status -->
              <div class="col-md-4">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Status</mat-label>
                  <mat-select formControlName="status">
                    <mat-option value="ACTIVE">Active</mat-option>
                    <mat-option value="INACTIVE">Inactive</mat-option>
                  </mat-select>
                </mat-form-field>
              </div>

              <!-- Description -->
              <div class="col-md-4">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Description</mat-label>
                  <textarea matInput formControlName="description"></textarea>
                </mat-form-field>
              </div>

            </div>

            <!-- Buttons -->
            <div class="mt-3">
              <button mat-raised-button [color]="isEdit() ? 'warn' : 'primary'" type="submit">
                {{ isEdit() ? 'Update Category' : 'Save Category' }}
              </button>

              <button mat-button type="button" (click)="resetForm()" class="ms-2">
                Reset
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Product Category List -->
  <div class="row">

    <div class="col-md-4 mb-3" *ngFor="let item of categoryList()">

      <div class="category-card p-3">

        <!-- Title -->
        <h6 class="fw-bold mb-1">{{item.name}}</h6>

        <!-- Description -->
        <p class="text-muted small mb-2">
          {{item.description || 'No description'}}
        </p>

        <!-- Status -->
        <span class="badge" [ngClass]="item.status === 'ACTIVE' ? 'bg-success' : 'bg-secondary'">
          {{item.status}}
        </span>

        <!-- 🔴 Product Count (future API) -->
        <div class="mt-3 small text-muted">
          Products: 
          {{item.productCount || 0}}
        </div>

        <!-- Actions -->
        <div class="mt-3 d-flex justify-content-between">

          <button class="btn btn-sm btn-outline-primary" (click)="onEdit(item)">
            Edit
          </button>

          <button class="btn btn-sm btn-outline-danger" (click)="onDelete(item.id)">
            Delete
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
