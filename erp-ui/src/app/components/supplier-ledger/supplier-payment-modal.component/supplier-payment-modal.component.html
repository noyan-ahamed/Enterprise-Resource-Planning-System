<h2 mat-dialog-title class="bg-primary text-white m-0 p-3 d-flex justify-content-between align-items-center">
  <span>
    <i class="fa-solid fa-money-bill-wave me-2"></i>
    Make Payment
  </span>
  <button mat-icon-button (click)="close()" class="text-white">
    <i class="fa-solid fa-xmark"></i>
  </button>
</h2>

<mat-dialog-content class="p-4">
  <form #paymentForm="ngForm" class="row g-2 mt-2">
    
    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100 dense-field">
        <mat-label>Supplier Name</mat-label>
        <input matInput [value]="supplierName" readonly>
        <mat-icon matPrefix class="me-2 text-secondary">person</mat-icon>
      </mat-form-field>
    </div>

    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100 dense-field">
        <mat-label>Payment Amount</mat-label>
        <input matInput type="number" [(ngModel)]="paymentData.amount" name="amount" required placeholder="0.00">
        <span matPrefix class="me-1">৳&nbsp;</span>
      </mat-form-field>
    </div>

    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100 dense-field">
        <mat-label>Payment Date</mat-label>
        <input matInput type="date" [(ngModel)]="paymentData.paymentDate" name="paymentDate" required>
      </mat-form-field>
    </div>

    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100 dense-field">
        <mat-label>Payment Method</mat-label>
        <mat-select [(ngModel)]="paymentData.paymentMethod" name="paymentMethod" required>
          @for (method of paymentMethods; track method) {
            <mat-option [value]="method">{{ method }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100 dense-field">
        <mat-label>Order ID (Optional)</mat-label>
        <input matInput type="number" [(ngModel)]="paymentData.purchaseOrderId" name="purchaseOrderId" placeholder="Ex: 1001">
      </mat-form-field>
    </div>

    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100 dense-field">
        <mat-label>Remarks / Note</mat-label>
        <textarea matInput rows="2" [(ngModel)]="paymentData.remarks" name="remarks" placeholder="Write any specific note..."></textarea>
      </mat-form-field>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="p-3 border-top">
  <button mat-button (click)="close()">Cancel</button>
  
  <button mat-raised-button 
          color="primary" 
          (click)="savePayment()" 
          [disabled]="!paymentForm.valid || loading">
    @if (loading) {
      <span class="spinner-border spinner-border-sm me-2"></span>
      Saving...
    } @else {
      <i class="fa-solid fa-check-circle me-2"></i>
      Confirm Payment
    }
  </button>
</mat-dialog-actions>
