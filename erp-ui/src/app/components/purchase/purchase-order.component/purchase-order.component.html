<div class="card shadow-sm m-4">
  <div class="card-header bg-white d-flex justify-content-between align-items-center py-2">
   <h5 class="mb-0" style="font-size: 1.2rem;">Purchase Orders</h5>
     <!-- Filter Dropdown -->
    <div class="d-flex align-items-center gap-2">
       <!-- Bootstrap Select -->
     <select class="form-select" 
        [(ngModel)]="filterRange" 
        (change)="setFilter($any($event.target).value)">
  <option value="TODAY">Today</option>
  <option value="7DAYS">Last 7 Days</option>
  <option value="15DAYS">Last 15 Days</option>
  <option value="LASTMONTH">Last Month</option>
  <option value="LAST2MONTHS">Last 2 Months</option>
  <option value="ALL">All</option>
</select>
   
  <!-- Button -->
  <button mat-raised-button color="primary"
          style="height: 38px; min-width: 140px; font-size: 0.85rem; white-space: nowrap; padding: 0 12px;"
          (click)="openDialog()">
    + New Purchase
  </button>
       </div>
  </div>

  <div class="card-body">
   
    <!-- Table inside a mat-card -->
    <mat-card class="erp-card shadow-sm">
      <table mat-table class="table table-hover table-striped">
        <thead class="bg-light">
          <tr>
            <th>#</th>
            <th>Invoice</th>
            <th>Supplier</th>
            <th>Date</th>
            <th>Total</th>
            <th>Status</th>
            <th class="text-center">Action</th>
            <th>Details/Download</th>
          </tr>
        </thead>
        <tbody>
          <tr  *ngFor="let p of filteredOrders(); let i = index">
            <td>{{i + 1}}</td>
            <td><code>{{p.invoiceNumber}}</code></td>
            <td>{{p.supplier?.name}}</td>
            <td>{{p.created_at | date}}</td>
            <td>{{p.totalAmount | number}}</td>
            <td>
              <span class="badge" [ngClass]="{
                'bg-warning': p.status === 'PENDING',
                'bg-info': p.status === 'APPROVED',
                'bg-success': p.status === 'RECEIVED',
                'bg-danger': p.status === 'CANCELLED'
              }">{{p.status}}</span>
            </td>
            <td class="text-center">
              <div class="btn-group">
                <!-- Pending Button -->
                <button mat-button [disabled]="true" class="btn btn-warning">Pending</button>

                <!-- Approve Button (Only enable if status is 'PENDING') -->
                <button mat-button [disabled]="p.status !== 'PENDING'" (click)="updateStatus(p, 'APPROVED')"
                  class="btn btn-info">
                  Approve
                </button>

                <!-- Receive Button (Only enable if status is 'APPROVED') -->
                <button mat-button [disabled]="p.status !== 'APPROVED'" (click)="updateStatus(p, 'RECEIVED')"
                  class="btn btn-success">
                  Receive
                </button>

                <!-- Cancel Button (Only enable if status is not 'RECEIVED' or 'CANCELLED') -->
                <button mat-button [disabled]="p.status === 'RECEIVED' || p.status === 'CANCELLED'"
                  (click)="updateStatus(p, 'CANCELLED')" class="btn btn-danger">
                  Cancel
                </button>
              </div>
            </td>
            <td>
              <button mat-raised-button color="primary" (click)="openViewDialog(p.id)">View</button>
              <button mat-raised-button color="accent" (click)="generateReport(p.id)">Print</button>
            </td>
          </tr>
        </tbody>
      </table>
    </mat-card>
  </div>
</div>
