<h2 mat-dialog-title class="bg-primary text-white m-0 p-3">
  {{ isEdit ? 'Edit Supplier' : 'Add New Supplier' }}
</h2>

<mat-dialog-content class="p-4">
  <form [formGroup]="supplierForm" class="row g-3">

    <!-- Name -->
    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Supplier Name</mat-label>
        <input matInput formControlName="name">
      </mat-form-field>
    </div>

    <!-- Company -->
    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Company Name</mat-label>
        <input matInput formControlName="companyName">
      </mat-form-field>
    </div>

    <!-- Mobile -->
    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Mobile (BD Format)</mat-label>
        <input matInput formControlName="mobileNumber" placeholder="017XXXXXXXX">
      </mat-form-field>
    </div>

    <!-- Email-->
    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" placeholder="example@gmail.com">
      </mat-form-field>
    </div>

    <!-- TIN -->
    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>TIN Number</mat-label>
        <input matInput formControlName="tinNumber">
      </mat-form-field>
    </div>

    <!-- Address -->
    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Address</mat-label>
        <textarea matInput formControlName="address" rows="2"></textarea>
      </mat-form-field>
    </div>

    <!-- Payment Terms -->
    <div class="col-md-4">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Payment Terms</mat-label>
        <mat-select formControlName="paymentTerms">
          <mat-option value="7_DAYS">7 Days</mat-option>
          <mat-option value="15_DAYS">15 Days</mat-option>
          <mat-option value="30_DAYS">30 Days</mat-option>
          <mat-option value="60_DAYS">60 Days</mat-option>
          <mat-option value="90_DAYS">90 Days</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <!-- Status -->
    <div class="col-md-4">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          <mat-option value="ACTIVE">Active</mat-option>
          <mat-option value="INACTIVE">Inactive</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <!-- Rating -->
    <div class="col-md-4">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Rating</mat-label>
        <mat-select formControlName="rating">
          <mat-option value="1">1 Star</mat-option>
          <mat-option value="2">2 Stars</mat-option>
          <mat-option value="3">3 Stars</mat-option>
          <mat-option value="4">4 Stars</mat-option>
          <mat-option value="5">5 Stars</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <!-- Bank Account -->
    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Bank Account</mat-label>
        <textarea matInput formControlName="bankAccount" rows="1"></textarea>
      </mat-form-field>
    </div>

    <!-- bKash -->
    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>bKash Number</mat-label>
        <input matInput formControlName="bkashNo">
      </mat-form-field>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="p-3 border-top">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary"
          (click)="onSubmit()"
          [disabled]="supplierForm.invalid">
    {{ isEdit ? 'Update Supplier' : 'Save Supplier' }}
  </button>
</mat-dialog-actions>
