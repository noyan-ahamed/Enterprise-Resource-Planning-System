<h2 mat-dialog-title class="bg-primary text-white m-0 p-3">
  {{ isEdit ? 'Edit Customer' : 'Add New Customer' }}
</h2>

<mat-dialog-content class="p-4">
  <form #customerForm="ngForm" class="row g-3">

    <!-- Name -->
    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Customer Name</mat-label>
        <input matInput name="name" [(ngModel)]="customer.name" required>
      </mat-form-field>
    </div>

    <!-- Company -->
    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Company Name</mat-label>
        <input matInput name="companyName" [(ngModel)]="customer.companyName">
      </mat-form-field>
    </div>

    <!-- Mobile -->
    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Mobile (BD Format)</mat-label>
        <input matInput name="mobileNumber"
               [(ngModel)]="customer.mobileNumber"
               required
               pattern="^(?:\+88|88)?(01[3-9]\d{8})$"
               placeholder="017XXXXXXXX">
      </mat-form-field>
    </div>

    <!-- Address -->
    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Address</mat-label>
        <textarea matInput name="address"
                  [(ngModel)]="customer.address"
                  rows="2"></textarea>
      </mat-form-field>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="p-3 border-top">
  <button mat-button mat-dialog-close>Cancel</button>

  <button mat-raised-button color="primary"
          (click)="onSubmit(customerForm)"
          [disabled]="customerForm.invalid">
    {{ isEdit ? 'Update Customer' : 'Save Customer' }}
  </button>
</mat-dialog-actions>
