

<h2 mat-dialog-title>New Purchase Order</h2>
<mat-dialog-content>
  <form #purchaseForm="ngForm"  class="container-fluid">
    <div class="row">

      <!-- Supplier -->
      <div class="col-md-6 mb-3">
        <label class="form-label">Supplier</label>
        <select class="form-select" name="supplierId" [(ngModel)]="newPurchase.supplierId" required>
          <option value="">Select Supplier</option>
          @for (s of suppliers(); track s.id) {
            <option [value]="s.id">{{s.name}}</option>
          }
        </select>
      </div>

      <!-- Payment Terms -->
      <div class="col-md-6 mb-3">
        <label class="form-label">Payment Terms</label>
        <select class="form-select" name="paymentTerms" [(ngModel)]="newPurchase.paymentTerms">
          <option value="7 Days">7 Days</option>
          <option value="15 Days">15 Days</option>
          <option value="30 Days">30 Days</option>
        </select>
      </div>
    </div>

    <hr>
    <h5>Items</h5>
    <div class="table-responsive">
      <table class="table table-bordered">
        <thead class="bg-light">
          <tr>
            <th style="width: 40%;">Product</th>
            <th>Quantity</th>
            <th>Unit</th>
            <th>Unit Price</th>
            <th>Line Total</th>
            <th>#</th>
          </tr>
        </thead>
        <tbody>
          @for (item of newPurchase.items; track $index) {
            <tr>
              <td>
                <select class="form-select" [(ngModel)]="item.productId" [name]="'prod'+$index" (change)="calculateTotal()">
                  <option value="">Select Product</option>
                  @for (p of products(); track p.id) {
                    <option [value]="p.id">{{p.name}}</option>
                  }
                </select>
              </td>

              <td>
                <input type="number" class="form-control" [(ngModel)]="item.quantity" [name]="'qty'+$index" (input)="calculateTotal()">
              </td>
              <td>
                <select class="form-select" [(ngModel)]="item.unit" [name]="'unit'+$index">
                <option value="">Select Unit</option>
                <option value="Pcs">Pcs</option>
                <option value="Kg">Kg</option>
                <option value="Box">Box</option>
              </select>
              </td>
              <td>
                <input type="number" class="form-control" [(ngModel)]="item.unitPrice" [name]="'prc'+$index" (input)="calculateTotal()">
              </td>
              <td class="fw-bold">
                {{ (item.quantity * item.unitPrice) | number }}
              </td>
              <td>
                <button type="button" class="btn btn-outline-danger btn-sm" (click)="removeItem($index)">×</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-2">
      <button type="button" class="btn btn-primary btn-sm" (click)="addItem()">+ Add Product</button>
      <div class="h5">Total: <span class="text-success">{{newPurchase.totalAmount | number}}</span></div>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="!purchaseForm.valid || newPurchase.items.length === 0" (click)="onSubmit()">Create Purchase</button>
</mat-dialog-actions>
