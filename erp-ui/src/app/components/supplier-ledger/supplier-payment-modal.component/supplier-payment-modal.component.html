<div class="modal-backdrop-custom" *ngIf="isOpen">
  <div class="modal-box-custom">
    <div class="modal-header-custom">
      <h4 class="mb-0">
        <i class="fa-solid fa-money-bill-wave me-2"></i>
        Make Payment
      </h4>
      <button class="btn-close-custom" (click)="close()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="modal-body-custom">
      <div class="mb-3">
        <label class="form-label fw-semibold">Supplier</label>
        <input type="text" class="form-control" [value]="supplierName" readonly />
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Amount</label>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="paymentData.amount"
          name="amount"
          placeholder="Enter amount"
        />
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Payment Date</label>
        <input
          type="date"
          class="form-control"
          [(ngModel)]="paymentData.paymentDate"
          name="paymentDate"
        />
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Payment Method</label>
        <select
          class="form-select"
          [(ngModel)]="paymentData.paymentMethod"
          name="paymentMethod"
        >
          <option *ngFor="let method of paymentMethods" [value]="method">
            {{ method }}
          </option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Purchase Order ID (Optional)</label>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="paymentData.purchaseOrderId"
          name="purchaseOrderId"
          placeholder="Optional"
        />
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Remarks</label>
        <textarea
          rows="3"
          class="form-control"
          [(ngModel)]="paymentData.remarks"
          name="remarks"
          placeholder="Write remarks"
        ></textarea>
      </div>
    </div>

    <div class="modal-footer-custom">
      <button class="btn btn-light" (click)="close()">Cancel</button>
      <button class="btn btn-success" (click)="savePayment()" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        {{ loading ? 'Saving...' : 'Save Payment' }}
      </button>
    </div>
  </div>
</div>
