<div class="container-fluid">

  <!-- Page Title -->
  <div class="row mb-3">
    <div class="col-12">
      <h3 class="fw-bold mb-0">Product Category</h3>
    </div>
  </div>

  <!-- Add New Product Category Button -->
<div class="row mb-4">
  <div class="col-12 d-flex justify-content-end">
    <button mat-raised-button color="primary" (click)="showForm = !showForm">
      <i class="fas fa-plus me-2"></i>
      Add New Product Category
    </button>
  </div>
</div>
  

  <!-- Add Product Category Form -->
  <div class="row mb-4" *ngIf="showForm">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white fw-semibold">
          Add Product Category
        </div>

        <div class="card-body">
          <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">

            <!-- 🔴 MUST: row না থাকলে col কাজ করবে না -->
            <div class="row g-3">

              <!-- Name -->
              <div class="col-md-4">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Category Name</mat-label>
                  <input matInput formControlName="name">
                </mat-form-field>
              </div>

              <!-- Status -->
              <div class="col-md-4">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Status</mat-label>
                  <mat-select formControlName="status">
                    <mat-option value="ACTIVE">Active</mat-option>
                    <mat-option value="INACTIVE">Inactive</mat-option>
                  </mat-select>
                </mat-form-field>
              </div>

              <!-- Description -->
              <div class="col-md-4">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Description</mat-label>
                  <textarea matInput formControlName="description" rows="1"></textarea>
                </mat-form-field>
              </div>

            </div>

            <!-- Buttons -->
            <div class="col-12 d-flex justify-content-end gap-2 mt-2">
              <button mat-raised-button [color]="isEdit() ? 'warn' : 'primary'" type="submit">
                {{ isEdit() ? 'Update Category' : 'Save Category' }}
              </button>

              <button mat-button type="button" (click)="resetForm()" class="ms-2">
                Reset
              </button>

              <button mat-button type="button" (click)="showForm = false" class="ms-2">
                Cancel
              </button>

            </div>

          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Product Category List -->
  <div class="row">
    <div class="col-md-4 mb-3" *ngFor="let item of categoryList()">
      <div class="category-card p-3" [ngClass]="{'bg-light': item.status === 'ACTIVE', 'bg-muted': item.status === 'INACTIVE'}">
        <!-- Title -->
        <h6 class="fw-bold mb-1" style="color: #333;">{{item.name}}</h6>

        <!-- Description -->
        <p class="text-muted small mb-2">
          {{item.description || 'No description'}}
        </p>

        <!-- Status -->
        <span class="badge" [ngClass]="item.status === 'ACTIVE' ? 'bg-success' : 'bg-secondary'">
          {{item.status}}
        </span>

        <!-- Product Count -->
        <div class="mt-3 small text-muted">
          Products: 
          {{item.productCount || 0}}
        </div>

        <!-- Actions -->
        <div class="mt-3 d-flex justify-content-between">
          <button class="btn btn-sm btn-outline-primary" (click)="onEdit(item)">
            Edit
          </button>

          <button class="btn btn-sm btn-outline-danger" (click)="onDelete(item.id)">
            Delete
          </button>
        </div>

      </div>
    </div>
  </div>

</div>
